# Render Blueprint — backend ISHT
# En Render: New → Blueprint → conectar repo → detecta este archivo.
# (Alternativa manual: New → Web Service → Root Directory: backend,
#  Build: pip install -r requirements.txt,
#  Start: uvicorn main:app --host 0.0.0.0 --port $PORT)
services:
  - type: web
    name: isht-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # Tras desplegar el frontend, fija el dominio Vercel aquí para cerrar CORS:
      # - key: CORS_ORIGINS
      #   value: https://tu-app.vercel.app
