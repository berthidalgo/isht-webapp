name: ISHT Backend Keep Alive

on:
  schedule:
    # Corre cada 10 minutos (Render free tier duerme tras 15 minutos de inactividad)
    - cron: '*/10 * * * *'
  workflow_dispatch: # Permite ejecutar manualmente el ping desde la pestaña Actions en GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send keep-alive ping to Render backend
        run: |
          echo "Enviando ping al backend de Render..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://isht-webapp.onrender.com/health)
          echo "Status de respuesta: $STATUS"
          if [ "$STATUS" -eq 200 ]; then
            echo "El backend está ONLINE y caliente."
          else
            echo "Alerta: El backend respondió con código $STATUS"
          fi
